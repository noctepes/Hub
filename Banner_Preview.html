<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Preview</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background:
        radial-gradient(ellipse 60% 50% at 10% 90%, rgba(255,55,0,.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 55% at 90% 10%, rgba(255,55,0,.06) 0%, transparent 60%),
        linear-gradient(135deg,#0a0908 0%,#1c1916 55%,#0a0908 100%);
      background-attachment: fixed;
      overflow: hidden;
    }
    .frame-wrap {
      position: absolute;
      top: 56px; /* offset for Hub back button */
      left: 0; right: 0; bottom: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <iframe src="./banner-preview/banner-builder.html" title="Banner Builder"></iframe>
  </div>
</body>
</html>
